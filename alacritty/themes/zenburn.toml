# Zenburn theme, mapped from ~/.vim/colors/zenburn.vim
# High-contrast background (matches g:zenburn_high_Contrast=1)

[colors.primary]
foreground = "#dcdccc"  # Normal guifg
background = "#1f1f1f"  # Normal guibg (high contrast)

[colors.cursor]
text   = "#000d18"
cursor = "#8faf9f"

[colors.selection]
text       = "#233323"
background = "#71d3b4"

[colors.normal]
# black   = "#3f3f3f"
red     = "#cc9393"  # String
green   = "#7f9f7f"  # Comment
yellow  = "#f0dfaf"  # Conditional / Keyword
blue    = "#8cd0d3"  # Number (zenburn has no true blue; this is its cyan-ish accent)
magenta = "#dc8cc3"
cyan    = "#93e0e3"
white   = "#dcdccc"  # Normal foreground

[colors.bright]
# black   = "#709080"  # DiffAdd fg / grey
red     = "#dca3a3"  # Boolean
green   = "#c3bf9f"  # Exception / StorageClass
yellow  = "#ffcfaf"  # Define / PreProc
blue    = "#94bff3"
magenta = "#ec93d3"
cyan    = "#9fafaf"  # LineNr fg
white   = "#ffffff"  # MoreMsg / Question
