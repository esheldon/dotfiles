set -g prefix C-a

set -g default-terminal "tmux-256color"
set -as terminal-features ',alacritty*:RGB'   # advertise truecolor to apps
set -as terminal-overrides ',alacritty:RGB'   # true-color support

# Workaround for claude-code issue #36785 — opts out of the unconditional
# truecolor-to-256 downgrade Claude applies when $TMUX is set.
set-environment -g CLAUDE_CODE_TMUX_TRUECOLOR 1

# Last active window
unbind l
bind C-a last-window

set -g status-keys vi
setw -g mode-keys vi

#bind j down-pane
#bind k up-pane
bind j select-pane -t :.+
bind k select-pane -t :.-

# Status Bar
set -g status-justify centre
set -g status-bg black
set -g status-fg white
set -g status-interval 3
set -g status-left '#[fg=green]#H#[default]'
set -g status-right '#[fg=blue,bold]%Y-%m-%d#[default] #[fg=green]%H:%M#[default]'

# Highlighting the active window in status bar
setw -g window-status-current-style "fg=yellow"

set -g pane-active-border-style "bg=default fg=blue"

# reloads the configuration, handy
bind r source-file ~/.tmux.conf

set -g history-limit 10000
